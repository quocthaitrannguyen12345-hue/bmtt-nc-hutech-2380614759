<!DOCTYPE html>
<html lang="en">
<head>
    <title>Rail Fence Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <table class="table">

            <tr>
                <td style="text-align: center; font-weight: bold; font-size: 25px;">
                    RAIL FENCE CIPHER
                </td>
            </tr>

            <tr><td style="font-weight: bold ; color: blue ;">ENCRYPTION</td></tr>

            <tr>
                <td>
                    <form method="post" action="/railfence/encrypt">
                        <div class="mb-3">
                            <label>Plain text:</label>
                            <input type="text" class="form-control" name="inputPlainText" required>
                        </div>

                        <div class="mb-3">
                            <label>Key:</label>
                            <input type="number" class="form-control" name="inputKeyPlain" required>
                        </div>

                        <button type="submit" class="btn btn-primary">Encrypt</button>
                    </form>
                </td>
            </tr>

            <tr><td style="font-weight: bold ; color: blue ;">DECRYPTION</td></tr>

            <tr>
                <td>
                    <form method="post" action="/railfence/decrypt">
                        <div class="mb-3">
                            <label>Cipher text:</label>
                            <input type="text" class="form-control" name="inputCipherText" required>
                        </div>

                        <div class="mb-3">
                            <label>Key:</label>
                            <input type="number" class="form-control" name="inputKeyCipher" required>
                        </div>

                        <button type="submit" class="btn btn-primary">Decrypt</button>
                    </form>
                </td>
            </tr>

        </table>
    </div>
</body>
</html>
